<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奥特曼日语学习秘密基地</title>
<style>
  :root {
    --bg: #fefefe;
    --surface: #fff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text2: #666;
    --accent: #c62828;
    --accent2: #e57373;
    --correct: #2e7d32;
    --tag-bg: #f5f5f5;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
    --radius: 10px;
    --font-ja: 'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
  }
  .dark {
    --bg: #1a1a2e;
    --surface: #252540;
    --border: #3a3a5c;
    --text: #e8e8e8;
    --text2: #aaa;
    --accent: #ff6b6b;
    --accent2: #cc5555;
    --correct: #66bb6a;
    --tag-bg: #2a2a44;
    --shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-ja);
    background: var(--bg);
    color: var(--text);
    min-height:100vh;
    line-height:1.6;
    transition: background .3s, color .3s;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    position:sticky; top:0; z-index:100;
  }
  header h1 { font-size:1.3rem; font-weight:700; letter-spacing:.5px; }
  .header-btns { display:flex; gap:8px; align-items:center; }
  .header-btns button {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size:.85rem;
    font-family: var(--font-ja);
    transition: background .2s;
  }
  .header-btns button:hover { background: rgba(255,255,255,.35); }
  nav {
    display:flex;
    background: var(--surface);
    border-bottom:1px solid var(--border);
    overflow-x:auto;
  }
  nav button {
    flex:1;
    min-width:80px;
    padding:12px 8px;
    border:none;
    background:none;
    font-size:.9rem;
    cursor:pointer;
    font-family: var(--font-ja);
    color: var(--text2);
    border-bottom:2px solid transparent;
    transition:all .2s;
    white-space:nowrap;
  }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight:700;
  }
  main { max-width:800px; margin:0 auto; padding:16px; }
  .tab { display:none; }
  .tab.active { display:block; }

  /* date header */
  .day-header {
    text-align:center;
    padding:10px 0 16px;
    color: var(--text2);
    font-size:.9rem;
  }
  .day-header strong { color: var(--accent); }

  /* progress bar */
  .prog-wrap {
    background: var(--border);
    border-radius:6px;
    height:8px;
    margin-bottom:20px;
    overflow:hidden;
  }
  .prog-fill {
    height:100%;
    background: var(--accent);
    border-radius:6px;
    transition:width .4s;
  }
  .prog-text { text-align:center; font-size:.85rem; color:var(--text2); margin-bottom:6px; }

  /* word grid */
  .word-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap:10px;
  }
  .word-card {
    background: var(--surface);
    border:1px solid var(--border);
    border-radius: var(--radius);
    padding:14px;
    cursor:pointer;
    user-select:none;
    box-shadow: var(--shadow);
    transition: transform .15s, border-color .2s;
    position:relative;
  }
  .word-card:hover { transform: translateY(-2px); border-color: var(--accent2); }
  .word-card.memorized { border-left:4px solid var(--correct); }
  .word-card .jp { font-size:1.2rem; font-weight:600; }
  .word-card .kana { font-size:.85rem; color:var(--text2); margin-top:2px; }
  .word-card .meaning { font-size:.9rem; color:var(--text2); margin-top:2px; }
  .word-card .kana { display:block; }
  .word-card .badge {
    position:absolute;
    top:8px; right:10px;
    font-size:.65rem;
    background: var(--tag-bg);
    color: var(--text2);
    padding:2px 7px;
    border-radius:10px;
  }
  .word-card .mem-btn {
    margin-top:8px;
    background: none;
    border:1px solid var(--correct);
    color: var(--correct);
    padding:4px 12px;
    border-radius:14px;
    font-size:.75rem;
    cursor:pointer;
    font-family: var(--font-ja);
    transition: all .2s;
  }
  .word-card .mem-btn.done { background:var(--correct); color:#fff; }

  /* Ultraman popup */
  @keyframes ultramanFly {
    0%   { transform: translate(-50%,0) scale(0); opacity:0; }
    15%  { transform: translate(-50%,-10px) scale(1.3); opacity:1; }
    30%  { transform: translate(-50%,-30px) scale(1); opacity:1; }
    100% { transform: translate(-50%,-120px) scale(.5); opacity:0; }
  }
  @keyframes ultramanGlow {
    0%,100% { filter: drop-shadow(0 0 6px #ffd700); }
    50%     { filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 40px #ff6b00); }
  }
  .ultraman-popup {
    position:fixed;
    z-index:9999;
    pointer-events:none;
    animation: ultramanFly 1.2s ease-out forwards;
  }
  .ultraman-popup svg {
    animation: ultramanGlow .6s ease-in-out 3;
  }

  /* grammar */
  .grammar-card {
    background: var(--surface);
    border:1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom:10px;
    overflow:hidden;
    box-shadow: var(--shadow);
  }
  .grammar-card summary {
    padding:14px 16px;
    cursor:pointer;
    font-weight:600;
    font-size:1rem;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .grammar-card summary .pat { color:var(--accent); font-size:1.1rem; }
  .grammar-card summary .lvl {
    font-size:.65rem;
    background:var(--accent);
    color:#fff;
    padding:1px 8px;
    border-radius:8px;
    margin-left:auto;
  }
  .grammar-card .body { padding:0 16px 16px; }
  .grammar-card .body .exp { color:var(--text2); font-size:.9rem; margin-bottom:8px; }
  .grammar-card .body .ex {
    background: var(--tag-bg);
    border-radius:6px;
    padding:10px 14px;
    margin-top:6px;
    font-size:.9rem;
  }
  .grammar-card .body .ex .jp { font-weight:600; }
  .grammar-card .body .ex .cn { color:var(--text2); margin-left:8px; font-size:.85rem; }

  /* progress tab */
  .stat-row {
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }
  .stat-box {
    flex:1; min-width:120px;
    background: var(--surface);
    border:1px solid var(--border);
    border-radius: var(--radius);
    padding:16px;
    text-align:center;
    box-shadow: var(--shadow);
  }
  .stat-box .num { font-size:2rem; font-weight:700; color:var(--accent); }
  .stat-box .label { font-size:.8rem; color:var(--text2); }
  .history-list { list-style:none; }
  .history-list li {
    padding:10px 14px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    margin-bottom:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow: var(--shadow);
  }
  .history-list li .date { font-weight:600; }
  .history-list li .cnt { color:var(--correct); font-weight:600; }

  /* notification bar */
  .notif-bar {
    background: #fff3cd;
    border:1px solid #ffc107;
    color:#856404;
    padding:10px 16px;
    border-radius:8px;
    margin-bottom:16px;
    display:none;
    text-align:center;
    font-size:.9rem;
  }
  .notif-bar button {
    background:#ffc107;
    border:none;
    color:#333;
    padding:4px 12px;
    border-radius:12px;
    cursor:pointer;
    margin-left:8px;
    font-family:var(--font-ja);
  }

  /* responsive */
  @media (max-width:500px) {
    .word-grid { grid-template-columns:1fr; }
    header h1 { font-size:1.1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>奥特曼日语学习秘密基地</h1>
  <div class="header-btns">
    <button onclick="toggleTheme()" id="themeBtn">🌙 暗色</button>
    <button onclick="requestNotify()">🔔 提醒</button>
  </div>
</header>

<nav>
  <button class="tab-btn active" data-tab="words">今日の単語</button>
  <button class="tab-btn" data-tab="grammar">文法</button>
  <button class="tab-btn" data-tab="progress">進捗</button>
</nav>

<main>
  <!-- ===== WORDS TAB ===== -->
  <div class="tab active" id="tab-words">
    <div class="day-header" id="dayHeader"></div>
    <div class="notif-bar" id="notifBar">
      まだ今日の単語を完了していません！
      <button onclick="requestNotify()">通知を設定</button>
    </div>
    <div class="prog-text" id="progText">今日の進捗: 0 / 20</div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="word-grid" id="wordGrid"></div>
  </div>

  <!-- ===== GRAMMAR TAB ===== -->
  <div class="tab" id="tab-grammar">
    <div style="margin-bottom:16px;">
      <select id="grammarFilter" onchange="renderGrammar()" style="padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font-ja);font-size:.9rem;">
        <option value="all">全部 N5~N2</option>
        <option value="N5">N5 基礎</option>
        <option value="N4">N4 初級</option>
        <option value="N3">N3 中級</option>
        <option value="N2">N2</option>
      </select>
    </div>
    <div id="grammarList"></div>
  </div>

  <!-- ===== PROGRESS TAB ===== -->
  <div class="tab" id="tab-progress">
    <div class="stat-row" id="statsRow"></div>
    <h3 style="margin-bottom:10px;">学習履歴（直近30日）</h3>
    <ul class="history-list" id="historyList"></ul>
  </div>
</main>

// ============================================================
// STATE
// ============================================================
function getToday() { return new Date().toISOString().slice(0,10); }
function lsGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function lsSet(k,v) { localStorage.setItem(k, JSON.stringify(v)); }

function getMemWords() { return lsGet('jp_memorized') || {}; }       // { "2026-05-29": ["食べる","飲む",...] }
function getMemGrammar() { return lsGet('jp_grammar_done') || []; }  // ["〜は〜です", ...]
function getTheme() { return lsGet('jp_theme') || 'light'; }

// deterministic shuffle based on seed (date string)
function seededShuffle(arr, seed) {
  let a = arr.slice();
  let hash = 0;
  for (let i=0; i<seed.length; i++) { hash = ((hash<<5)-hash)+seed.charCodeAt(i); hash |= 0; }
  for (let i=a.length-1; i>0; i--) {
    hash = (hash*1103515245 + 12345) | 0;
    let j = ((hash>>>0) % (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDailyWords() {
  let today = getToday();
  let shuffled = seededShuffle(WORD_BANK, today);
  return shuffled.slice(0, 20);
}

function getTodaysMemorized() {
  let m = getMemWords();
  return m[getToday()] || [];
}

function toggleWord(jp, btn) {
  let m = getMemWords();
  let today = getToday();
  if (!m[today]) m[today] = [];
  let idx = m[today].indexOf(jp);
  if (idx >= 0) {
    m[today].splice(idx, 1);
  } else {
    m[today].push(jp);
    if (btn) spawnUltraman(btn);
  }
  lsSet('jp_memorized', m);
  renderWords();
}

// ============================================================
// RENDER
// ============================================================
function renderWords() {
  let words = getDailyWords();
  let memorized = getTodaysMemorized();
  let cnt = 0;

  document.getElementById('dayHeader').innerHTML =
    `<strong>${getToday()}</strong> — 今日の単語 20選`;

  let grid = document.getElementById('wordGrid');
  grid.innerHTML = '';

  words.forEach(w => {
    let isMem = memorized.includes(w.j);
    if (isMem) cnt++;
    let card = document.createElement('div');
    card.className = 'word-card' + (isMem ? ' memorized' : '');
    card.innerHTML = `
      <span class="badge">${w.cat}</span>
      <div class="jp">${w.j} <span style="font-size:.8rem;color:var(--text2);font-weight:400;">${w.m}</span></div>
      <div class="kana">${w.k}</div>
      <button class="mem-btn${isMem ? ' done' : ''}" onclick="event.stopPropagation();toggleWord('${w.j}', this)">
        ${isMem ? '✓ 覚えた' : '覚えた？'}
      </button>
    `;
    grid.appendChild(card);
  });

  // update progress
  document.getElementById('progText').textContent = `今日の進捗: ${cnt} / 20`;
  document.getElementById('progFill').style.width = (cnt/20*100) + '%';

  // notif bar
  document.getElementById('notifBar').style.display = (cnt < 20) ? 'block' : 'none';
}

function renderGrammar() {
  let filter = document.getElementById('grammarFilter').value;
  let list = document.getElementById('grammarList');
  let done = getMemGrammar();
  let data = filter === 'all' ? GRAMMAR_BANK : GRAMMAR_BANK.filter(g => g.lvl === filter);

  list.innerHTML = data.map((g, i) => `
    <details class="grammar-card" ${done.includes(g.pat) ? '' : ''}>
      <summary>
        <span class="pat">${g.pat}</span>
        <span class="lvl">${g.lvl}</span>
      </summary>
      <div class="body">
        <div class="exp">${g.exp}</div>
        ${g.ex.map(e => `<div class="ex"><span class="jp">${e.j}</span><span class="cn">${e.c}</span></div>`).join('')}
        <button onclick="event.preventDefault();toggleGrammarDone('${g.pat.replace(/'/g,"\\'")}')"
          style="margin-top:10px;background:var(--accent);color:#fff;border:none;padding:5px 14px;border-radius:12px;cursor:pointer;font-family:var(--font-ja);font-size:.8rem;">
          ${done.includes(g.pat) ? '✓ 完了' : '完了にする'}
        </button>
      </div>
    </details>
  `).join('');
}

function toggleGrammarDone(pat) {
  let done = getMemGrammar();
  let idx = done.indexOf(pat);
  if (idx >= 0) { done.splice(idx, 1); }
  else { done.push(pat); }
  lsSet('jp_grammar_done', done);
  renderGrammar();
}

function renderProgress() {
  // stats
  let mem = getMemWords();
  let totalMem = 0;
  let days = 0;
  let today = getToday();
  let d = new Date();
  let history = [];

  for (let i=29; i>=0; i--) {
    let dd = new Date(d);
    dd.setDate(dd.getDate() - i);
    let key = dd.toISOString().slice(0,10);
    let arr = mem[key] || [];
    if (arr.length > 0) {
      totalMem += arr.length;
      days++;
    }
    history.push({ date: key, count: arr.length });
  }

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box"><div class="num">${totalMem}</div><div class="label">累計単語数</div></div>
    <div class="stat-box"><div class="num">${days}</div><div class="label">学習日数(30日)</div></div>
    <div class="stat-box"><div class="num">${getMemGrammar().length}</div><div class="label">文法完了</div></div>
    <div class="stat-box"><div class="num">${WORD_BANK.length}</div><div class="label">収録単語総数</div></div>
  `;

  document.getElementById('historyList').innerHTML = history.reverse().map(h => `
    <li>
      <span class="date">${h.date}</span>
      <span class="cnt">${h.count > 0 ? '✓ ' + h.count + '単語' : '—'}</span>
    </li>
  `).join('');
}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    if (this.dataset.tab === 'progress') renderProgress();
  });
});

// ============================================================
// THEME
// ============================================================
function toggleTheme() {
  let cur = document.body.classList.contains('dark') ? 'light' : 'dark';
  document.body.classList.toggle('dark', cur === 'dark');
  lsSet('jp_theme', cur);
  document.getElementById('themeBtn').textContent = cur === 'dark' ? '☀️ 明色' : '🌙 暗色';
}

(function initTheme() {
  let t = getTheme();
  if (t === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️ 明色';
  }
})();

// ============================================================
// NOTIFICATION
// ============================================================
function requestNotify() {
  if (!('Notification' in window)) { alert('このブラウザは通知に対応していません。'); return; }
  if (Notification.permission === 'granted') {
    scheduleNotification();
    alert('通知を設定しました！毎日朝9時にリマインドします。');
  } else if (Notification.permission === 'denied') {
    alert('通知がブロックされています。ブラウザの設定から許可してください。');
  } else {
    Notification.requestPermission().then(p => {
      if (p === 'granted') {
        scheduleNotification();
        alert('通知を設定しました！');
      }
    });
  }
}

function scheduleNotification() {
  let now = new Date();
  let target = new Date(now);
  target.setHours(9, 0, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 1);
  let delay = target.getTime() - now.getTime();

  // show immediate demo notification
  if (Notification.permission === 'granted') {
    new Notification('奥特曼日语学习秘密基地', { body: '今日も20単語を覚えよう！📚', icon: '📖' });
    // schedule next one
    setTimeout(() => {
      new Notification('奥特曼日语学习秘密基地', { body: '今日の単語はもうチェックした？20単語覚えよう！', icon: '📖' });
      // then schedule daily
      setInterval(() => {
        new Notification('奥特曼日语学习秘密基地', { body: '今日の単語はもうチェックした？20単語覚えよう！', icon: '📖' });
      }, 86400000);
    }, delay);
  }
}

// ============================================================
// INIT
// ============================================================
renderWords();
renderGrammar();
